name: CI (build & test)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-backend:
    name: Build + test backend (API)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Api/Api.sln

      - name: Build
        run: dotnet build Api/Api.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Api.Tests/Api.Tests.csproj --configuration Release --no-build --verbosity normal

  build-and-test-frontend:
    name: Build + test frontend (ClientApp)
    runs-on: ubuntu-latest
    needs: build-and-test-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: ClientApp
        run: npm ci

      - name: Build
        working-directory: ClientApp
        run: npm run build